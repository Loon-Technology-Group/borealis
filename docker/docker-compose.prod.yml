services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: borealis
      POSTGRES_USER: borealis
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # No ports: intentionally internal only

  collector:
    image: loontechcraig/borealis-collector:latest
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://borealis:${POSTGRES_PASSWORD}@postgres:5432/borealis
      USER_AGENT: ${USER_AGENT}
      KP_URL: ${KP_URL}
      BZ_URL: ${BZ_URL}
      WIND_URL: ${WIND_URL}

  api:
    image: loontechcraig/borealis-api:latest
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "443:443"
    volumes:
      - /opt/borealis/certs:/certs:ro
    environment:
      DATABASE_URL: postgresql://borealis:${POSTGRES_PASSWORD}@postgres:5432/borealis
      SKIP_TLS: "false"
      TLS_CERT_PATH: /certs/origin.pem
      TLS_KEY_PATH: /certs/origin.key

volumes:
  pgdata:
